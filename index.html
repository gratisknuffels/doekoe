<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wie wordt Millionair?</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f0c040;
    --gold-light: #ffe080;
    --gold-dark: #b8860b;
    --blue-deep: #000833;
    --blue-mid: #001560;
    --blue-bright: #0033cc;
    --silver: #c0c8d8;
    --white: #f8f4e8;
    --correct: #00cc44;
    --wrong: #cc2200;
    --used: #556;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--blue-deep);
    font-family: 'Cinzel', serif;
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 90%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 85% 75%, rgba(240,192,64,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 10%, rgba(240,192,64,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  #screen-start, #screen-game, #screen-end {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 920px;
    padding: 20px;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* START SCREEN */
  #screen-start { text-align: center; }

  .logo { margin-bottom: 18px; }

  .logo-main {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.6rem, 5vw, 3rem);
    font-weight: 700;
    background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    letter-spacing: 2px;
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 10px rgba(240,192,64,0.4)); }
    50% { filter: drop-shadow(0 0 25px rgba(240,192,64,0.8)); }
  }

  .logo-sub { font-size: clamp(0.7rem, 2vw, 1rem); color: var(--silver); letter-spacing: 6px; margin-top: 6px; }

  .prize-display {
    font-size: clamp(2rem, 8vw, 5rem);
    font-family: 'Cinzel Decorative', serif;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 12px 0;
    animation: pulse-glow 2s ease-in-out infinite;
  }

  .difficulty-section { margin: 14px 0 10px; }
  .difficulty-label { font-size: 0.68rem; letter-spacing: 4px; color: var(--silver); margin-bottom: 12px; }

  .difficulty-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .diff-btn {
    background: rgba(0,21,96,0.8);
    border: 2px solid var(--gold-dark);
    border-radius: 8px;
    padding: 12px 20px;
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 2px;
    color: var(--silver);
    cursor: pointer;
    transition: all 0.3s;
    min-width: 120px;
  }

  .diff-btn:hover, .diff-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(0,40,140,0.9);
    transform: scale(1.05);
    box-shadow: 0 0 16px rgba(240,192,64,0.4);
  }

  .diff-btn .diff-icon { display: block; font-size: 1.4rem; margin-bottom: 4px; }
  .diff-btn .diff-time { display: block; font-size: 0.58rem; color: var(--silver); margin-top: 4px; letter-spacing: 1px; }

  .lifeline-intro { display: flex; justify-content: center; gap: 14px; margin: 14px 0; flex-wrap: wrap; }

  .lifeline-badge {
    background: rgba(0,21,96,0.8);
    border: 1px solid var(--gold-dark);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.68rem;
    color: var(--silver);
    text-align: center;
  }
  .lifeline-badge span { display: block; font-size: 1.3rem; margin-bottom: 3px; }

  .sound-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 10px 0;
    font-size: 0.68rem;
    color: var(--silver);
    letter-spacing: 2px;
    cursor: pointer;
    user-select: none;
  }

  .sound-toggle input { display: none; }

  .toggle-track {
    width: 40px; height: 20px;
    background: rgba(0,21,96,0.8);
    border: 1px solid var(--gold-dark);
    border-radius: 10px;
    position: relative;
    transition: background 0.3s;
  }

  .toggle-track::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 14px; height: 14px;
    background: var(--silver);
    border-radius: 50%;
    transition: transform 0.3s, background 0.3s;
  }

  .sound-toggle input:checked + .toggle-track { background: rgba(0,51,160,0.9); border-color: var(--gold); }
  .sound-toggle input:checked + .toggle-track::after { transform: translateX(20px); background: var(--gold); }

  .btn-start {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light), var(--gold));
    color: var(--blue-deep);
    border: none;
    padding: 18px 60px;
    font-family: 'Cinzel', serif;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 3px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 14px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn-start::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }

  .btn-start:hover::before { transform: translateX(100%); }
  .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(240,192,64,0.6); }

  /* GAME SCREEN */
  #screen-game { display: none; }

  .game-layout {
    display: grid;
    grid-template-columns: 1fr 200px;
    gap: 20px;
    align-items: start;
  }

  @media (max-width: 680px) {
    .game-layout { grid-template-columns: 1fr; }
    .prize-ladder { display: none; }
  }

  .lifelines-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    justify-content: center;
    align-items: flex-end;
  }

  .lifeline-btn {
    background: radial-gradient(circle at 30% 30%, #224, var(--blue-mid));
    border: 2px solid var(--gold-dark);
    border-radius: 50%;
    width: 56px; height: 56px;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.3s;
    color: var(--white);
    position: relative;
    flex-shrink: 0;
  }

  .lifeline-btn:hover:not(:disabled) { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 15px rgba(240,192,64,0.5); }
  .lifeline-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--used); }

  .lifeline-btn .ll-label {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.45rem;
    white-space: nowrap;
    color: var(--silver);
    letter-spacing: 1px;
  }

  /* TIMER */
  .timer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-left: auto;
    flex-shrink: 0;
  }

  .timer-circle {
    width: 62px; height: 62px;
    position: relative;
  }

  .timer-circle svg { transform: rotate(-90deg); width: 62px; height: 62px; }
  .timer-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 5; }
  .timer-arc { fill: none; stroke: var(--gold); stroke-width: 5; stroke-linecap: round; transition: stroke 0.5s; }

  .timer-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    transition: color 0.5s;
  }

  .timer-label { font-size: 0.44rem; letter-spacing: 2px; color: var(--silver); margin-top: 4px; }

  .timer-urgent .timer-arc { stroke: #ff4400 !important; }
  .timer-urgent .timer-num { color: #ff4400; animation: blink 0.5s ease-in-out infinite; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .question-container {
    background: radial-gradient(ellipse at top, #001a5e, var(--blue-deep));
    border: 2px solid var(--gold-dark);
    border-radius: 8px;
    padding: 26px 36px;
    text-align: center;
    margin-bottom: 14px;
    position: relative;
    min-height: 108px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .question-container::before, .question-container::after {
    content: '◆';
    position: absolute;
    color: var(--gold);
    font-size: 1rem;
    top: 50%;
    transform: translateY(-50%);
  }
  .question-container::before { left: 12px; }
  .question-container::after { right: 12px; }

  .question-number { font-size: 0.62rem; color: var(--gold); letter-spacing: 3px; margin-bottom: 10px; }
  .question-text { font-size: clamp(0.86rem, 2.3vw, 1.08rem); line-height: 1.65; }

  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  @media (max-width: 500px) { .answers-grid { grid-template-columns: 1fr; } }

  .answer-btn {
    background: linear-gradient(135deg, rgba(0,21,96,0.9), rgba(0,5,40,0.95));
    border: 2px solid var(--gold-dark);
    border-radius: 6px;
    padding: 13px 15px;
    color: var(--white);
    font-family: 'Cinzel', serif;
    font-size: clamp(0.66rem, 1.65vw, 0.86rem);
    cursor: pointer;
    transition: all 0.25s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 56px;
  }

  .answer-btn:hover:not(:disabled):not(.hidden-50) {
    background: linear-gradient(135deg, rgba(0,51,180,0.9), rgba(0,21,96,0.95));
    border-color: var(--gold);
    transform: scale(1.02);
    box-shadow: 0 0 12px rgba(240,192,64,0.3);
  }

  .answer-letter {
    background: var(--gold-dark);
    color: var(--blue-deep);
    border-radius: 50%;
    width: 26px; height: 26px; min-width: 26px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 0.74rem;
  }

  .answer-btn.selected { border-color: var(--gold); background: linear-gradient(135deg, #0033aa, #001166); animation: pulse-border 0.6s ease-in-out infinite; }
  .answer-btn.correct { border-color: var(--correct); background: linear-gradient(135deg, #003322, #001100); }
  .answer-btn.correct .answer-letter { background: var(--correct); color: #fff; }
  .answer-btn.wrong { border-color: var(--wrong); background: linear-gradient(135deg, #330000, #110000); }
  .answer-btn.wrong .answer-letter { background: var(--wrong); color: #fff; }
  .answer-btn.hidden-50 { opacity: 0.1; pointer-events: none; }
  .answer-btn:disabled { cursor: not-allowed; }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 5px rgba(240,192,64,0.3); }
    50% { box-shadow: 0 0 22px rgba(240,192,64,0.9); }
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: rgba(0,21,96,0.5);
    border: 1px solid var(--gold-dark);
    border-radius: 6px;
    font-size: 0.7rem;
    color: var(--silver);
    letter-spacing: 2px;
  }

  .current-prize { color: var(--gold); font-weight: 700; font-size: 0.88rem; }

  .btn-walk {
    background: transparent;
    border: 1px solid var(--silver);
    color: var(--silver);
    padding: 8px 16px;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s;
  }
  .btn-walk:hover { border-color: var(--gold); color: var(--gold); }

  .prize-ladder {
    background: radial-gradient(ellipse at top, #001a5e, var(--blue-deep));
    border: 1px solid var(--gold-dark);
    border-radius: 8px;
    padding: 10px 0;
    font-size: 0.6rem;
  }

  .ladder-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 12px;
    color: var(--silver);
    letter-spacing: 1px;
    border-left: 3px solid transparent;
    transition: all 0.3s;
  }

  .ladder-item.current { background: rgba(240,192,64,0.1); border-left-color: var(--gold); color: var(--gold); font-weight: 700; }
  .ladder-item.passed { color: #445; }
  .ladder-item.milestone { color: #aaf0aa; }
  .ladder-item.milestone.current { color: var(--gold); }
  .ladder-num { font-size: 0.5rem; opacity: 0.5; }

  .audience-poll {
    background: rgba(0,10,40,0.95);
    border: 2px solid var(--gold-dark);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
    animation: fadeIn 0.4s ease;
  }

  .poll-title { text-align: center; color: var(--gold); font-size: 0.65rem; letter-spacing: 3px; margin-bottom: 12px; }
  .poll-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .poll-letter { width: 18px; font-size: 0.7rem; color: var(--gold); font-weight: 700; }
  .poll-bar-bg { flex: 1; height: 22px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
  .poll-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue-bright), var(--gold));
    border-radius: 4px;
    width: 0%;
    transition: width 1.2s ease;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 6px;
    font-size: 0.6rem; font-weight: 700; color: var(--white);
    min-width: 28px;
  }

  .phone-friend {
    background: rgba(0,10,40,0.95);
    border: 2px solid var(--gold-dark);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
    animation: fadeIn 0.4s ease;
    font-size: 0.78rem;
    line-height: 1.8;
    color: var(--silver);
  }
  .phone-title { text-align: center; color: var(--gold); font-size: 0.65rem; letter-spacing: 3px; margin-bottom: 10px; }
  .phone-text { font-style: italic; }

  /* END SCREEN */
  #screen-end { text-align: center; }

  .end-title { font-family: 'Cinzel Decorative', serif; font-size: clamp(1.3rem, 4vw, 2.4rem); margin-bottom: 8px; }

  .end-prize {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2.5rem, 10vw, 6rem);
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: pulse-glow 2s ease-in-out infinite;
    margin: 8px 0;
  }

  .end-msg { color: var(--silver); font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 26px; line-height: 1.8; }

  .confetti-piece {
    position: fixed;
    top: -20px;
    animation: confetti-fall linear forwards;
    z-index: 999;
    border-radius: 2px;
  }

  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .overlay-msg {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    pointer-events: none;
  }

  .overlay-text {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 8vw, 4rem);
    color: var(--gold);
    text-shadow: 0 0 40px rgba(240,192,64,0.8), 0 0 80px rgba(240,192,64,0.4);
    animation: overlay-pop 1.6s ease forwards;
  }

  @keyframes overlay-pop {
    0% { transform: scale(0.5); opacity: 0; }
    30% { transform: scale(1.1); opacity: 1; }
    70% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.2); opacity: 0; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="screen-start">
  <div class="logo">
    <div class="logo-main">Wie wordt<br>Millionair?</div>
    <div class="logo-sub">HET KLASSIEKE QUIZSPEL</div>
  </div>
  <div class="prize-display">€1.000.000</div>

  <div class="difficulty-section">
    <div class="difficulty-label">KIES JE MOEILIJKHEIDSGRAAD</div>
    <div class="difficulty-buttons">
      <button class="diff-btn" data-diff="easy" onclick="setDifficulty('easy')">
        <span class="diff-icon">🌟</span>
        MAKKELIJK
        <span class="diff-time">60 sec / vraag</span>
      </button>
      <button class="diff-btn active" data-diff="normal" onclick="setDifficulty('normal')">
        <span class="diff-icon">⚡</span>
        NORMAAL
        <span class="diff-time">45 sec / vraag</span>
      </button>
      <button class="diff-btn" data-diff="hard" onclick="setDifficulty('hard')">
        <span class="diff-icon">🔥</span>
        MOEILIJK
        <span class="diff-time">30 sec / vraag</span>
      </button>
    </div>
  </div>

  <div class="lifeline-intro">
    <div class="lifeline-badge"><span>50:50</span>VIJFTIG-VIJFTIG</div>
    <div class="lifeline-badge"><span>📞</span>BEL EEN VRIEND</div>
    <div class="lifeline-badge"><span>👥</span>PUBLIEKSVRAAG</div>
  </div>

  <label class="sound-toggle">
    <input type="checkbox" id="sound-check" checked>
    <span class="toggle-track"></span>
    GELUID AAN
  </label>

  <button class="btn-start" onclick="startGame()">SPEEL NU</button>
</div>

<!-- GAME SCREEN -->
<div id="screen-game">
  <div class="game-layout">
    <div class="game-main">
      <div class="lifelines-bar">
        <button class="lifeline-btn" id="ll-fifty" onclick="useFiftyFifty()" title="50:50">
          50:50<span class="ll-label">VIJFTIG-VIJFTIG</span>
        </button>
        <button class="lifeline-btn" id="ll-phone" onclick="usePhone()" title="Bel een Vriend">
          📞<span class="ll-label">BEL VRIEND</span>
        </button>
        <button class="lifeline-btn" id="ll-audience" onclick="useAudience()" title="Publieksvraag">
          👥<span class="ll-label">PUBLIEK</span>
        </button>
        <div class="timer-wrap">
          <div class="timer-circle" id="timer-circle">
            <svg viewBox="0 0 62 62">
              <circle class="timer-bg" cx="31" cy="31" r="27"/>
              <circle class="timer-arc" id="timer-arc" cx="31" cy="31" r="27"
                stroke-dasharray="169.6" stroke-dashoffset="0"/>
            </svg>
            <div class="timer-num" id="timer-num">45</div>
          </div>
          <div class="timer-label">SECONDEN</div>
        </div>
      </div>

      <div id="panel-audience" class="audience-poll hidden"></div>
      <div id="panel-phone" class="phone-friend hidden"></div>

      <div class="question-container">
        <div class="question-number" id="question-number">VRAAG 1 VAN 15</div>
        <div class="question-text" id="question-text"></div>
      </div>

      <div class="answers-grid" id="answers-grid"></div>

      <div class="status-bar">
        <div>GEGARANDEERD: <span id="guaranteed-prize" style="color:var(--gold)">€0</span></div>
        <div class="current-prize" id="current-prize-display">€100</div>
        <button class="btn-walk" onclick="walkAway()">STOPPEN</button>
      </div>
    </div>

    <div class="prize-ladder" id="prize-ladder"></div>
  </div>
</div>

<!-- END SCREEN -->
<div id="screen-end" class="hidden">
  <div class="logo">
    <div class="logo-main">Wie wordt<br>Millionair?</div>
  </div>
  <div class="end-title" id="end-title"></div>
  <div class="end-prize" id="end-prize"></div>
  <div class="end-msg" id="end-msg"></div>
  <button class="btn-start" onclick="restartGame()">OPNIEUW SPELEN</button>
</div>

<script>
// ── PRIZES ─────────────────────────────────────────────
const PRIZES = ["€100","€200","€300","€500","€1.000","€2.000","€4.000","€8.000","€16.000","€32.000","€64.000","€125.000","€250.000","€500.000","€1.000.000"];

// ── AUDIO (Web Audio API) ────────────────────────────────
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function isSoundOn() { return document.getElementById('sound-check').checked; }

function playTone(freq, dur, type='sine', vol=0.28, delay=0) {
  if (!isSoundOn()) return;
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    g.gain.setValueAtTime(0, ctx.currentTime + delay);
    g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    o.start(ctx.currentTime + delay);
    o.stop(ctx.currentTime + delay + dur + 0.05);
  } catch(e) {}
}

  correct:     () => { playTone(523,.12,'sine',.28); playTone(659,.12,'sine',.28,.14); playTone(784,.25,'sine',.3,.28); playTone(1047,.45,'sine',.35,.54); },
  wrong:       () => { playTone(300,.18,'sawtooth',.28); playTone(220,.25,'sawtooth',.3,.2); playTone(150,.45,'sawtooth',.25,.46); },
  milestone:   () => [523,659,784,1047,1319].forEach((f,i)=>playTone(f,.22,'sine',.28,i*.1)),
  millionaire: () => { [523,659,784,1047,1319,1568,2093].forEach((f,i)=>playTone(f,.28,'sine',.3,i*.14)); setTimeout(()=>{ [523,659,784,1047].forEach((f,i)=>playTone(f,1.4,'sine',.32,i*.04)); },1200); },
  walk:        () => { playTone(440,.18,'sine',.24); playTone(370,.2,'sine',.2,.2); playTone(330,.4,'sine',.15,.42); },
  tick:        (s) => { if(s<=10) playTone(880,.05,'square',.12); }

// ── HELPERS ──────────────────────────────────────────────
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function buildQuestionSet() {
  const pick=(pool,n)=>shuffle(pool).slice(0,n).map(q=>{
    const idx=shuffle([0,1,2,3]);
    return { q:q.q, a:idx.map(i=>q.a[i]), correct:idx.indexOf(q.correct) };
  });
  return [...pick(QUESTION_POOL.easy,5), ...pick(QUESTION_POOL.medium,5), ...pick(QUESTION_POOL.hard,5)];
}

// ── STATE ────────────────────────────────────────────────
let ALL_QUESTIONS=[], currentQ=0;
let lifelinesUsed={fifty:false,phone:false,audience:false};
let answered=false, gameActive=false;
let timerInterval=null, timeLeft=45, timePerQuestion=45;
let selectedDifficulty='normal';

// ── DIFFICULTY ───────────────────────────────────────────
function setDifficulty(diff) {
  selectedDifficulty = diff;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-diff="${diff}"]`).classList.add('active');
  SFX.select();
}

// ── GAME START ───────────────────────────────────────────
function startGame() {
  ALL_QUESTIONS = buildQuestionSet();
  currentQ = 0;
  lifelinesUsed = {fifty:false,phone:false,audience:false};
  answered = false;
  gameActive = true;
  timePerQuestion = DIFFICULTY_TIMES[selectedDifficulty];

  document.getElementById('screen-start').style.display='none';
  document.getElementById('screen-game').style.display='block';
  document.getElementById('screen-end').classList.add('hidden');

  ['ll-fifty','ll-phone','ll-audience'].forEach(id=>{ document.getElementById(id).disabled=false; });
  buildLadder();
  loadQuestion();
}

// ── LADDER ───────────────────────────────────────────────
function buildLadder() {
  const ladder=document.getElementById('prize-ladder');
  ladder.innerHTML='';
  for(let i=PRIZES.length-1;i>=0;i--) {
    const el=document.createElement('div');
    el.id=`ladder-${i}`;
    el.className='ladder-item'+(MILESTONES.includes(i)?' milestone':'')+(i===currentQ?' current':'')+(i<currentQ?' passed':'');
    el.innerHTML=`<span class="ladder-num">${i+1}</span><span>${PRIZES[i]}</span>`;
    ladder.appendChild(el);
  }
}

function updateLadder() {
  for(let i=0;i<PRIZES.length;i++) {
    const el=document.getElementById(`ladder-${i}`);
    if(!el) continue;
    el.className='ladder-item'+(MILESTONES.includes(i)?' milestone':'')+(i===currentQ?' current':'')+(i<currentQ?' passed':'');
  }
}

// ── LOAD QUESTION ────────────────────────────────────────
function loadQuestion() {
  answered=false;
  hidePanels();
  const q=ALL_QUESTIONS[currentQ];
  document.getElementById('question-number').textContent=`VRAAG ${currentQ+1} VAN 15`;
  document.getElementById('question-text').textContent=q.q;
  document.getElementById('current-prize-display').textContent=PRIZES[currentQ];
  document.getElementById('guaranteed-prize').textContent=currentQ>0?GUARANTEED[currentQ-1]:'€0';
  updateLadder();

  const grid=document.getElementById('answers-grid');
  grid.innerHTML='';
  ['A','B','C','D'].forEach((letter,i)=>{
    const btn=document.createElement('button');
    btn.className='answer-btn'; btn.id=`ans-${i}`;
    btn.innerHTML=`<span class="answer-letter">${letter}</span><span>${q.a[i]}</span>`;
    btn.onclick=()=>selectAnswer(i);
    grid.appendChild(btn);
  });
  startTimer();
}

// ── TIMER ────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  timeLeft=timePerQuestion;
  renderTimer();
  timerInterval=setInterval(()=>{
    timeLeft--;
    SFX.tick(timeLeft);
    renderTimer();
    if(timeLeft<=0){ clearInterval(timerInterval); if(!answered) timeUp(); }
  },1000);
}

function stopTimer() { clearInterval(timerInterval); }

function renderTimer() {
  const CIRC=169.6;
  const arc=document.getElementById('timer-arc');
  const num=document.getElementById('timer-num');
  const circle=document.getElementById('timer-circle');
  const pct=Math.max(0,timeLeft/timePerQuestion);
  arc.style.strokeDashoffset=CIRC*(1-pct);
  num.textContent=timeLeft;
  if(timeLeft<=10){
    circle.classList.add('timer-urgent');
  } else if(timeLeft<=Math.floor(timePerQuestion*0.4)){
    circle.classList.remove('timer-urgent');
    arc.style.stroke='#ffaa00';
  } else {
    circle.classList.remove('timer-urgent');
    arc.style.stroke='var(--gold)';
  }
}

function timeUp() {
  if(answered) return;
  answered=true;
  const q=ALL_QUESTIONS[currentQ];
  document.querySelectorAll('.answer-btn').forEach(b=>b.disabled=true);
  document.getElementById(`ans-${q.correct}`).classList.add('correct');
  SFX.wrong();
  showOverlay('⏰ TIJD OP!');
  setTimeout(()=>endGame(false,currentQ>0?GUARANTEED[currentQ-1]:'€0',true),2300);
}

// ── SELECT ANSWER ────────────────────────────────────────
function selectAnswer(index) {
  if(answered) return;
  answered=true;
  stopTimer();
  hidePanels();
  SFX.select();

  const q=ALL_QUESTIONS[currentQ];
  const btns=document.querySelectorAll('.answer-btn');
  btns[index].classList.add('selected');
  btns.forEach(b=>b.disabled=true);

  setTimeout(()=>{
    btns[index].classList.remove('selected');
    if(index===q.correct) {
      btns[index].classList.add('correct');
      const ms=MILESTONES.includes(currentQ);
      ms ? SFX.milestone() : SFX.correct();
      showOverlay(ms?'🏆 VEILIG!':'JUIST!');
      setTimeout(()=>{
        if(currentQ===14){ SFX.millionaire(); endGame(true,PRIZES[14]); }
        else { currentQ++; loadQuestion(); }
      },2300);
    } else {
      btns[index].classList.add('wrong');
      btns[q.correct].classList.add('correct');
      SFX.wrong();
      showOverlay('FOUT!');
      setTimeout(()=>endGame(false,currentQ>0?GUARANTEED[currentQ-1]:'€0'),2300);
    }
  },1200);
}

// ── LIFELINES ────────────────────────────────────────────
function useFiftyFifty() {
  if(lifelinesUsed.fifty||answered) return;
  lifelinesUsed.fifty=true;
  document.getElementById('ll-fifty').disabled=true;
  SFX.select();
  const q=ALL_QUESTIONS[currentQ];
  shuffle([0,1,2,3].filter(i=>i!==q.correct)).slice(0,2).forEach(i=>{
    document.getElementById(`ans-${i}`).classList.add('hidden-50');
  });
}

function usePhone() {
  if(lifelinesUsed.phone||answered) return;
  lifelinesUsed.phone=true;
  document.getElementById('ll-phone').disabled=true;
  SFX.select();
  const q=ALL_QUESTIONS[currentQ];
  const letters=['A','B','C','D'];
  const conf=Math.random()>.3?'vrij zeker':'denk ik';
  const sug=Math.random()>.2?q.correct:(q.correct+1)%4;
  const friend=["Alex","Sanne","Bas","Laura","Daan","Emma","Tom","Noor"][Math.floor(Math.random()*8)];
  const panel=document.getElementById('panel-phone');
  panel.classList.remove('hidden');
  panel.innerHTML=`<div class="phone-title">📞 BEL EEN VRIEND — ${friend.toUpperCase()}</div>
    <div class="phone-text">"Hé! Oh wow, oké... ik ben ${conf} dat het <strong style="color:var(--gold)">${letters[sug]} — ${q.a[sug]}</strong> is. Ik herinner me iets hierover gelezen te hebben. Maar je weet hoe ik ben, ik kan het mis hebben! Veel succes!"</div>`;
}

function useAudience() {
  if(lifelinesUsed.audience||answered) return;
  lifelinesUsed.audience=true;
  document.getElementById('ll-audience').disabled=true;
  SFX.select();
  const q=ALL_QUESTIONS[currentQ];
  const letters=['A','B','C','D'];
  let pcts=[0,0,0,0];
  pcts[q.correct]=Math.floor(Math.random()*25)+50;
  let rem=100-pcts[q.correct];
  const others=shuffle([0,1,2,3].filter(i=>i!==q.correct));
  others.forEach((idx,pos)=>{
    if(pos===others.length-1){ pcts[idx]=rem; }
    else{ const v=Math.floor(Math.random()*rem*0.6); pcts[idx]=v; rem-=v; }
  });
  const panel=document.getElementById('panel-audience');
  panel.classList.remove('hidden');
  panel.innerHTML=`<div class="poll-title">👥 PUBLIEKSVRAAG</div>`+
    letters.map((l,i)=>`<div class="poll-bar-row">
      <span class="poll-letter">${l}</span>
      <div class="poll-bar-bg"><div class="poll-bar-fill" id="bar-${i}" style="width:0%">${pcts[i]}%</div></div>
    </div>`).join('');
  setTimeout(()=>letters.forEach((_,i)=>{ const b=document.getElementById(`bar-${i}`); if(b) b.style.width=pcts[i]+'%'; }),60);
}

function hidePanels() {
  document.getElementById('panel-audience').classList.add('hidden');
  document.getElementById('panel-phone').classList.add('hidden');
}

// ── WALK AWAY ────────────────────────────────────────────
function walkAway() {
  if(!gameActive) return;
  stopTimer();
  SFX.walk();
  endGame('walk', currentQ>0?PRIZES[currentQ-1]:'€0');
}

// ── OVERLAY ──────────────────────────────────────────────
function showOverlay(text) {
  document.querySelector('.overlay-msg')?.remove();
  const div=document.createElement('div');
  div.className='overlay-msg';
  div.innerHTML=`<div class="overlay-text">${text}</div>`;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),1800);
}

// ── END GAME ─────────────────────────────────────────────
function endGame(won, prize, timedOut=false) {
  gameActive=false;
  stopTimer();
  document.getElementById('screen-game').style.display='none';
  document.getElementById('screen-end').classList.remove('hidden');
  document.getElementById('end-prize').textContent=prize;
  const diffNames={easy:'Makkelijk',normal:'Normaal',hard:'Moeilijk'};
  if(won===true){
    document.getElementById('end-title').textContent='🏆 JIJ BENT MILJONAIR! 🏆';
    document.getElementById('end-msg').textContent=`Alle 15 vragen correct op ${diffNames[selectedDifficulty]} niveau!`;
    launchConfetti();
  } else if(won==='walk'){
    document.getElementById('end-title').textContent='Je Hebt Gestopt';
    document.getElementById('end-msg').textContent=`Je stopte bij vraag ${currentQ+1}. Verstandige keuze!`;
  } else if(timedOut){
    document.getElementById('end-title').textContent='⏰ Tijd Voorbij!';
    document.getElementById('end-msg').textContent=`De tijd liep op bij vraag ${currentQ+1}. Je gaat naar huis met je gegarandeerde prijs.`;
  } else {
    document.getElementById('end-title').textContent='Helaas!';
    document.getElementById('end-msg').textContent=`Verkeerd antwoord bij vraag ${currentQ+1}. Je gaat naar huis met je gegarandeerde prijs.`;
  }
}

// ── CONFETTI ─────────────────────────────────────────────
function launchConfetti() {
  const colors=['#f0c040','#ffffff','#0033cc','#ff4444','#44ff88','#ff88ff','#88ffff'];
  for(let i=0;i<120;i++) {
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti-piece';
      el.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*2.5+2}s;width:${Math.random()*10+6}px;height:${Math.random()*10+6}px;border-radius:${Math.random()>.5?'50%':'2px'}`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),5500);
    },i*22);
  }
}

// ── RESTART ──────────────────────────────────────────────
function restartGame() {
  document.getElementById('screen-end').classList.add('hidden');
  const s=document.getElementById('screen-start');
  s.style.display='flex'; s.style.flexDirection='column'; s.style.alignItems='center';
}
